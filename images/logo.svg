<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="KinneHo Nepal logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#121a2e"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00b4ff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#00b4ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#00b4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square badge -->
  <rect x="4" y="4" width="192" height="192" rx="42" fill="url(#bg)" stroke="url(#beam)" stroke-width="3"/>

  <!-- ground projection glow -->
  <ellipse cx="100" cy="158" rx="62" ry="14" fill="url(#glow)"/>

  <!-- projector turn-signal arrow projected on ground -->
  <g opacity="0.95">
    <path d="M70 150 L100 118 L130 150 L122 150 L122 160 L78 160 L78 150 Z" fill="url(#beam)"/>
    <path d="M88 150 L100 134 L112 150 Z" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- motorcycle headlight emitting the beam -->
  <g>
    <circle cx="100" cy="92" r="20" fill="#0a0e1a" stroke="url(#beam)" stroke-width="4"/>
    <circle cx="100" cy="92" r="9" fill="#eaffff"/>
    <circle cx="100" cy="92" r="9" fill="#00b4ff" opacity="0.35"/>
  </g>

  <!-- beam cone down to projected arrow -->
  <path d="M100 112 L70 150 L130 150 Z" fill="url(#beam)" opacity="0.22"/>
</svg>
